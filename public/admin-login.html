<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Administrador</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#fff;
    width:400px;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#777;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#0d6efd;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

.erro{
    color:red;
    text-align:center;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="card">

<h1>🔐 Administração</h1>

<p>Cota-ção</p>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Senha">

<button onclick="login()">

Entrar

</button>

<div id="erro" class="erro"></div>

</div>

<script>
async function login(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        const resposta = await fetch("/api/admin/login", {
            method: "POST",
            credentials: "include",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });


        const dados = await resposta.json();

        console.log(dados);


        if (resposta.ok) {

            window.location.href = "/admin.html";

        } else {

            document.getElementById("erro").innerHTML = dados.error;

        }


    } catch (erro) {

        console.error(erro);

        document.getElementById("erro").innerHTML =
        "Erro de conexão";

    }

}
</script>

</body>
</html>
