<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cota-ção - Login de Fornecedor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auth-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }

    .auth-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .auth-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group input.error {
      border-color: #e74c3c;
    }

    .error-message {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #27ae60;
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .toggle-auth {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .toggle-auth button {
      background: none;
      color: #667eea;
      text-decoration: underline;
      padding: 0;
      margin-top: 0;
      cursor: pointer;
      font-weight: 600;
    }

    .toggle-auth button:hover {
      transform: none;
      box-shadow: none;
      color: #764ba2;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .row .form-group {
      margin-bottom: 0;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 30px 20px;
      }

      .auth-header h1 {
        font-size: 24px;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>🥩 Cota-ção</h1>
        <p>Portal do Fornecedor</p>
      </div>

      <!-- Formulário de Login -->
      <div id="loginForm" class="form-section active">
        <h2 style="font-size: 20px; color: #333; margin-bottom: 20px;">Fazer Login</h2>
        
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" required>
          <div class="error-message" id="loginEmailError"></div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Senha</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
          <div class="error-message" id="loginPasswordError"></div>
        </div>

        <button onclick="handleLogin()">Entrar</button>

        <div class="toggle-auth">
          Não tem conta? 
          <button type="button" onclick="toggleForms()">Registre-se aqui</button>
        </div>
      </div>

      <!-- Formulário de Registro -->
      <div id="registerForm" class="form-section">
        <h2 style="font-size: 20px; color: #333; margin-bottom: 20px;">Criar Conta</h2>
        
        <div class="row">
          <div class="form-group">
            <label for="registerName">Nome da Empresa</label>
            <input type="text" id="registerName" placeholder="Sua Empresa" required>
            <div class="error-message" id="registerNameError"></div>
          </div>

          <div class="form-group">
            <label for="registerPhone">Telefone</label>
            <input type="tel" id="registerPhone" placeholder="(11) 99999-9999">
            <div class="error-message" id="registerPhoneError"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" placeholder="seu@email.com" required>
          <div class="error-message" id="registerEmailError"></div>
        </div>

        <div class="form-group">
          <label for="registerPassword">Senha</label>
          <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required>
          <div class="error-message" id="registerPasswordError"></div>
        </div>

        <div class="form-group">
          <label for="registerConfirmPassword">Confirmar Senha</label>
          <input type="password" id="registerConfirmPassword" placeholder="Confirme a senha" required>
          <div class="error-message" id="registerConfirmPasswordError"></div>
        </div>

        <button onclick="handleRegister()">Criar Conta</button>

        <div class="toggle-auth">
          Já tem conta? 
          <button type="button" onclick="toggleForms()">Faça login aqui</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleForms() {
      document.getElementById('loginForm').classList.toggle('active');
      document.getElementById('registerForm').classList.toggle('active');
      clearErrors();
    }

    function clearErrors() {
      document.querySelectorAll('.error-message').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });
    }

    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
      }
    }

    async function handleLogin() {
      clearErrors();
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email) {
        showError('loginEmailError', 'Email é obrigatório');
        return;
      }

      if (!password) {
        showError('loginPasswordError', 'Senha é obrigatória');
        return;
      }

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showError('loginPasswordError', data.error || 'Erro ao fazer login');
          return;
        }

        // Sucesso - redirecionar para dashboard
        localStorage.setItem('supplier', JSON.stringify(data.supplier));
        window.location.href = '/dashboard.html';
      } catch (error) {
        showError('loginPasswordError', 'Erro na conexão. Tente novamente.');
        console.error('Erro:', error);
      }
    }

    async function handleRegister() {
      clearErrors();
      
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const phone = document.getElementById('registerPhone').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;

      let hasError = false;

      if (!name) {
        showError('registerNameError', 'Nome da empresa é obrigatório');
        hasError = true;
      }

      if (!email) {
        showError('registerEmailError', 'Email é obrigatório');
        hasError = true;
      }

      if (!password) {
        showError('registerPasswordError', 'Senha é obrigatória');
        hasError = true;
      }

      if (password.length < 6) {
        showError('registerPasswordError', 'Senha deve ter no mínimo 6 caracteres');
        hasError = true;
      }

      if (password !== confirmPassword) {
        showError('registerConfirmPasswordError', 'Senhas não conferem');
        hasError = true;
      }

      if (hasError) return;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, email, phone, password, confirmPassword })
        });

        const data = await response.json();

        if (!response.ok) {
          showError('registerEmailError', data.error || 'Erro ao registrar');
          return;
        }

        // Sucesso - fazer login automático
        localStorage.setItem('supplier', JSON.stringify({
          id: data.supplierId,
          name: name,
          email: email
        }));
        window.location.href = '/dashboard.html';
      } catch (error) {
        showError('registerEmailError', 'Erro na conexão. Tente novamente.');
        console.error('Erro:', error);
      }
    }

    // Enter para enviar formulário
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        if (loginForm.classList.contains('active')) {
          handleLogin();
        } else if (registerForm.classList.contains('active')) {
          handleRegister();
        }
      }
    });

    // Verificar se já está autenticado
    async function checkAuth() {
      try {
        const response = await fetch('/api/auth/me');
        if (response.ok) {
          // Já está autenticado, redirecionar para dashboard
          window.location.href = '/dashboard.html';
        }
      } catch (error) {
        console.error('Erro ao verificar autenticação:', error);
      }
    }

    checkAuth();
  </script>
</body>
</html>
